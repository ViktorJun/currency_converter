<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="g1" x1="120" y1="120" x2="1040" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7286FF"/>
      <stop offset="1" stop-color="#5472FF"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8EA4FF"/>
      <stop offset="1" stop-color="#5B79FF"/>
    </linearGradient>
    <filter id="shadow-lg" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="26" flood-color="#4B66C8" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow-md" x="-30%" y="-30%" width="160%" height="190%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#4B66C8" flood-opacity="0.16"/>
    </filter>
    <filter id="shadow-sm" x="-40%" y="-40%" width="180%" height="220%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#4B66C8" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- main application panel -->
  <g filter="url(#shadow-lg)">
    <rect x="315" y="80" width="610" height="500" rx="42" fill="url(#g1)"/>
    <rect x="315" y="80" width="610" height="68" rx="42" fill="#DDE6FF"/>
    <rect x="315" y="116" width="610" height="32" fill="#DDE6FF"/>

    <circle cx="360" cy="114" r="7" fill="#B8C7FF"/>
    <circle cx="386" cy="114" r="7" fill="#B8C7FF"/>
    <circle cx="845" cy="114" r="7" fill="#5C72D9"/>
    <circle cx="871" cy="114" r="7" fill="#B9C7FF"/>
    <circle cx="897" cy="114" r="7" fill="#F4F7FF"/>

    <rect x="360" y="170" width="520" height="360" rx="34" fill="#FFFFFF"/>

    <!-- top content placeholders instead of text -->
    <rect x="410" y="210" width="220" height="20" rx="10" fill="#DAE3FF"/>
    <rect x="410" y="248" width="300" height="18" rx="9" fill="#ECF1FF"/>
    <rect x="410" y="278" width="260" height="18" rx="9" fill="#ECF1FF"/>

    <!-- clean pill placeholders -->
    <rect x="410" y="330" width="170" height="48" rx="24" fill="#EEF3FF"/>
    <circle cx="440" cy="354" r="10" fill="#6B80FF"/>
    <rect x="462" y="345" width="84" height="18" rx="9" fill="#D6E0FF"/>

    <rect x="598" y="330" width="170" height="48" rx="24" fill="#EEF3FF"/>
    <circle cx="628" cy="354" r="10" fill="#6B80FF"/>
    <rect x="650" y="345" width="84" height="18" rx="9" fill="#D6E0FF"/>

    <!-- lower content placeholders -->
    <rect x="410" y="412" width="210" height="14" rx="7" fill="#E8EEFF"/>
    <rect x="410" y="438" width="180" height="14" rx="7" fill="#E8EEFF"/>
    <rect x="410" y="464" width="230" height="14" rx="7" fill="#E8EEFF"/>

    <!-- lock card -->
    <g filter="url(#shadow-sm)">
      <rect x="708" y="208" width="120" height="120" rx="30" fill="#F4F7FF"/>
      <path d="M751 246V233C751 217.536 763.536 205 779 205C794.464 205 807 217.536 807 233V246" stroke="url(#g2)" stroke-width="12" stroke-linecap="round"/>
      <rect x="741" y="241" width="76" height="64" rx="20" fill="url(#g2)"/>
      <circle cx="779" cy="271" r="8" fill="white"/>
      <rect x="775" y="278" width="8" height="18" rx="4" fill="white"/>
    </g>
  </g>

  <!-- USD card -->
  <g filter="url(#shadow-md)">
    <rect x="55" y="218" width="405" height="104" rx="28" fill="white"/>
    <g transform="translate(92 252)">
      <circle cx="22" cy="18" r="22" fill="#fff" stroke="#E8EDFF" stroke-width="2"/>
      <clipPath id="usclip">
        <circle cx="22" cy="18" r="22"/>
      </clipPath>
      <g clip-path="url(#usclip)">
        <rect width="44" height="44" fill="#fff"/>
        <rect width="44" height="4" y="0" fill="#E26161"/>
        <rect width="44" height="4" y="8" fill="#E26161"/>
        <rect width="44" height="4" y="16" fill="#E26161"/>
        <rect width="44" height="4" y="24" fill="#E26161"/>
        <rect width="44" height="4" y="32" fill="#E26161"/>
        <rect width="44" height="4" y="40" fill="#E26161"/>
        <rect width="18" height="18" x="0" y="0" fill="#5472D9"/>
        <circle cx="5" cy="4" r="1.2" fill="#fff"/>
        <circle cx="11" cy="4" r="1.2" fill="#fff"/>
        <circle cx="15" cy="4" r="1.2" fill="#fff"/>
        <circle cx="8" cy="9" r="1.2" fill="#fff"/>
        <circle cx="14" cy="9" r="1.2" fill="#fff"/>
        <circle cx="5" cy="14" r="1.2" fill="#fff"/>
        <circle cx="11" cy="14" r="1.2" fill="#fff"/>
        <circle cx="15" cy="14" r="1.2" fill="#fff"/>
      </g>
    </g>
    <text x="180" y="281" fill="#39466A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">USD</text>
    <text x="292" y="284" fill="#2E3758" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">1,000.00</text>
  </g>

  <!-- UAH card -->
  <g filter="url(#shadow-md)">
    <rect x="55" y="372" width="405" height="104" rx="28" fill="white"/>
    <g transform="translate(92 406)">
      <circle cx="22" cy="18" r="22" fill="#fff" stroke="#E8EDFF" stroke-width="2"/>
      <clipPath id="uaclip">
        <circle cx="22" cy="18" r="22"/>
      </clipPath>
      <g clip-path="url(#uaclip)">
        <rect width="44" height="22" y="0" fill="#4B7BE8"/>
        <rect width="44" height="22" y="22" fill="#F2CC42"/>
      </g>
    </g>
    <text x="180" y="435" fill="#39466A" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">UAH</text>
    <text x="258" y="438" fill="#2E3758" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">41,250.00</text>
  </g>

  <!-- improved swap icon -->
  <g filter="url(#shadow-sm)">
    <circle cx="400" cy="349" r="56" fill="url(#g2)"/>
    <!-- upper arrow -->
    <path d="M360 328H427" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M408 311L427 328L408 345" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- lower arrow -->
    <path d="M440 370H373" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <path d="M392 353L373 370L392 387" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- shield -->
  <g filter="url(#shadow-md)">
    <path d="M1010 582C1004 582 997.9 580.1 992.8 576.9C927.3 536.2 892 498.5 892 447.5V373.8C892 366 897 359 904.4 356.6L1010 322L1115.6 356.6C1123 359 1128 366 1128 373.8V447.5C1128 498.5 1092.7 536.2 1027.2 576.9C1022.1 580.1 1016 582 1010 582Z" fill="url(#g3)"/>
    <path d="M960 448L991 479L1060 410" stroke="white" stroke-width="17" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- subtle decorative dots -->
  <circle cx="1085" cy="160" r="8" fill="#DCE5FF"/>
  <circle cx="1125" cy="195" r="5" fill="#E6ECFF"/>
  <circle cx="1068" cy="255" r="6" fill="#DCE5FF"/>
  <circle cx="144" cy="160" r="7" fill="#E6ECFF"/>
  <circle cx="222" cy="540" r="8" fill="#DCE5FF"/>
</svg>
