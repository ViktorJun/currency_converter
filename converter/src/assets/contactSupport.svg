<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="panel" x1="290" y1="70" x2="900" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#E2EAFE"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7387FF"/>
      <stop offset="1" stop-color="#4767F3"/>
    </linearGradient>
    <filter id="shadow-xl" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#4661C6" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow-lg" x="-25%" y="-25%" width="150%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#4661C6" flood-opacity="0.16"/>
    </filter>
    <filter id="shadow-sm" x="-35%" y="-35%" width="170%" height="190%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#4661C6" flood-opacity="0.14"/>
    </filter>
  </defs>

  <!-- Center browser/map -->
  <g filter="url(#shadow-xl)">
    <rect x="250" y="70" width="670" height="440" rx="32" fill="url(#panel)"/>
    <rect x="250" y="70" width="670" height="58" rx="32" fill="#D6E1FF"/>
    <rect x="250" y="100" width="670" height="28" fill="#D6E1FF"/>
    <circle cx="287" cy="100" r="6.5" fill="#FBFCFF"/>
    <circle cx="312" cy="100" r="6.5" fill="#FBFCFF"/>
    <circle cx="337" cy="100" r="6.5" fill="#FBFCFF"/>

    <rect x="295" y="150" width="580" height="300" rx="24" fill="#F8FAFF"/>

    <!-- map lines -->
    <path d="M330 370C373 329 414 306 456 263C499 220 540 190 602 170" stroke="#E6EBF6" stroke-width="22" stroke-linecap="round"/>
    <path d="M392 175C432 210 470 249 505 288C531 316 551 347 566 388" stroke="#EEF2F9" stroke-width="22" stroke-linecap="round"/>
    <path d="M525 170C560 205 595 240 626 276C656 310 680 347 694 388" stroke="#E8EDF7" stroke-width="22" stroke-linecap="round"/>
    <path d="M684 175C651 206 621 237 591 271C564 301 538 334 519 370" stroke="#F0F3F9" stroke-width="22" stroke-linecap="round"/>
    <path d="M744 185C714 214 687 242 659 272C632 301 608 332 585 365" stroke="#E9EDF7" stroke-width="22" stroke-linecap="round"/>
    <path d="M770 205C796 234 820 259 839 288" stroke="#EFF3F9" stroke-width="22" stroke-linecap="round"/>

    <!-- location pin -->
    <g filter="url(#shadow-sm)">
      <path d="M531 266C531 229.549 560.549 200 597 200C633.451 200 663 229.549 663 266C663 315.237 605.911 360.272 600.111 364.72C598.233 366.159 595.767 366.159 593.889 364.72C588.089 360.272 531 315.237 531 266Z" fill="url(#blue)"/>
      <circle cx="597" cy="261" r="22" fill="#FAFCFF"/>
    </g>
  </g>

  <!-- Phone card -->
  <g filter="url(#shadow-lg)">
    <rect x="58" y="160" width="265" height="112" rx="24" fill="#FFFFFF"/>
    <!-- icon fully above text lines -->
    <g transform="translate(98 188)">
      <path d="M21.09 5.1C23.67 3.86 26.75 4.44 28.62 6.51L32.67 11.06C34.57 13.2 34.64 16.41 32.82 18.63L28.57 23.77C32.93 30.67 38.79 36.53 45.69 40.89L50.83 36.64C53.05 34.82 56.26 34.89 58.4 36.79L62.95 40.84C65.02 42.71 65.6 45.79 64.36 48.37L62.17 52.93C60.92 55.53 58.2 57.13 55.32 56.93C44.22 56.16 34.08 51.18 25.34 42.44C16.6 33.7 11.62 23.56 10.85 12.46C10.65 9.58 12.25 6.86 14.85 5.61L19.41 3.42C19.94 3.16 20.51 3.05 21.09 3.1Z" fill="url(#blue)"/>
    </g>
    <rect x="165" y="193" width="92" height="13" rx="6.5" fill="#D9DFED"/>
    <rect x="165" y="218" width="72" height="11" rx="5.5" fill="#E6EBF6"/>
  </g>

  <!-- Chat card -->
  <g filter="url(#shadow-lg)">
    <rect x="92" y="326" width="232" height="112" rx="24" fill="#FFFFFF"/>
    <g transform="translate(128 356)">
      <path d="M28 0C12.54 0 0 11.04 0 24.67C0 32.31 3.95 39.14 10.11 43.63C9.45 47.89 7.15 52.53 4.8 55.75C4.05 56.76 5 58.15 6.2 57.87C13.01 56.28 19.19 53.19 23.33 50.76C24.86 50.95 26.42 51.04 28 51.04C43.46 51.04 56 40 56 26.37C56 12.74 43.46 0 28 0Z" fill="none" stroke="url(#blue)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <rect x="202" y="360" width="58" height="13" rx="6.5" fill="#CFD7EA"/>
    <rect x="202" y="385" width="42" height="11" rx="5.5" fill="#E4E9F5"/>
  </g>

  <!-- Support card -->
  <g filter="url(#shadow-lg)">
    <rect x="825" y="205" width="315" height="212" rx="26" fill="#FFFFFF"/>
    <circle cx="866" cy="244" r="8" fill="#D5DCEC"/>

    <!-- headset icon kept clearly above the text lines -->
    <g transform="translate(944 228)">
      <path d="M0 34C0 4.18 24.18 -20 54 -20C83.82 -20 108 4.18 108 34" fill="none" stroke="url(#blue)" stroke-width="6.5" stroke-linecap="round"/>
      <rect x="4" y="31" width="18" height="44" rx="9" fill="none" stroke="url(#blue)" stroke-width="6.5"/>
      <rect x="86" y="31" width="18" height="44" rx="9" fill="none" stroke="url(#blue)" stroke-width="6.5"/>
      <path d="M104 63C104 80.12 90.12 94 73 94H62" fill="none" stroke="url(#blue)" stroke-width="6.5" stroke-linecap="round"/>
      <rect x="54" y="89" width="18" height="9" rx="4.5" fill="url(#blue)"/>
    </g>

    <!-- text lines positioned lower so they don't intersect icon -->
    <circle cx="868" cy="335" r="7" fill="#CCD4E8"/>
    <circle cx="868" cy="360" r="7" fill="#CCD4E8"/>
    <circle cx="868" cy="385" r="7" fill="#CCD4E8"/>
    <rect x="887" y="329" width="190" height="12" rx="6" fill="#D8DFEE"/>
    <rect x="887" y="354" width="170" height="12" rx="6" fill="#E6EBF6"/>
    <rect x="887" y="379" width="150" height="12" rx="6" fill="#E6EBF6"/>
  </g>

  <circle cx="1110" cy="150" r="7" fill="#E1E7FF"/>
  <circle cx="1086" cy="445" r="6" fill="#E7ECFF"/>
  <circle cx="148" cy="488" r="7" fill="#E7ECFF"/>
</svg>
